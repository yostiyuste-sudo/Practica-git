<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Contactos - CRM</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <header class="topnav">
        <div class="topnav-left">
            <div class="hs-logo">
                <svg width="26" height="26" viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="30" fill="#ff7a59" />
                    <path d="M22 20v12.5a7.5 7.5 0 1 0 7.5-7.5H22" stroke="#fff" stroke-width="4.5"
                        stroke-linecap="round" />
                </svg>
            </div>
            <nav class="top-menu">
                <a href="#" class="top-link active">Gestión de Contactos</a>
            </nav>
        </div>
        <div class="topnav-right">
            <div class="avatar-wrap">
                <div class="avatar">U</div>
                <span class="portal-name">Admin Sistema</span>
            </div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidenav">
            <button class="sidenav-icon active" title="Contactos"><i class="fa fa-users"></i></button>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-title-row">
                    <h1 class="page-title">Directorio de Contactos</h1>
                    <span class="record-count" id="recordCount">0 registros</span>
                </div>

                <div class="page-actions-row">
                    <div class="filter-group">
                        <label class="switch-wrap">
                            <input type="checkbox" id="filterActiveOnly" checked onchange="renderTable()">
                            <span class="switch-toggle"></span>
                            <span class="switch-label">Solo Activos</span>
                        </label>
                    </div>
                    <button class="btn btn-primary" id="btnNuevoContacto">
                        <i class="fa fa-plus"></i> Registrar Contacto
                    </button>
                </div>
            </div>

            <div class="table-wrap">
                <table id="contactsTable">
                    <thead>
                        <tr>
                            <th class="sortable" onclick="sortTable(0)">NOMBRE <i class="fa fa-sort"></i></th>
                            <th class="sortable" onclick="sortTable(1)">ENTIDAD <i class="fa fa-sort"></i></th>
                            <th class="sortable" onclick="sortTable(2)">MEDIO DE CONTACTO <i class="fa fa-sort"></i>
                            </th>
                            <th class="sortable" onclick="sortTable(3)">ESTADO <i class="fa fa-sort"></i></th>
                            <th class="sortable" onclick="sortTable(4)">REGISTRO <i class="fa fa-sort"></i></th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination">
                <button class="page-btn" id="btnPrev" onclick="changePage(-1)">
                    <i class="fa fa-chevron-left"></i> Anterior
                </button>
                <span class="page-indicator" id="pageIndicator">1</span>
                <button class="page-btn" id="btnNext" onclick="changePage(1)">
                    Siguiente <i class="fa fa-chevron-right"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- MODAL REGISTRO -->
    <div class="modal-overlay" id="modalContacto">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Contacto</h2>
                <button class="modal-close" onclick="closeModal('modalContacto')"><i class="fa fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="contactForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label>Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="contactName" placeholder="Nombre y Apellido" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Entidad <span class="required">*</span></label>
                            <select id="contactEntity">
                                <option value="Cliente">Cliente</option>
                                <option value="Proveedor">Proveedor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Estado Inicial</label>
                            <select id="contactStatus">
                                <option value="ACTIVO">ACTIVO</option>
                                <option value="INACTIVO">INACTIVO</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-note">
                        <i class="fa fa-info-circle"></i> Debe ingresar correo o teléfono.
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="contactEmail" placeholder="ejemplo@correo.com">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="contactPhone" placeholder="+57 300 0000000">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('modalContacto')">Cancelar</button>
                <button class="btn btn-primary" onclick="handleSaveContact()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
